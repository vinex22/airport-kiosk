<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Vision - Object Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .logos { display: flex; align-items: center; gap: 18px; margin-bottom: 1rem; }
        .logos img { height: 32px; }
        .logos span { font-size: 22px; color: #999; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .bounce1 { animation: bounce 2s ease-in-out infinite; }
        .bounce2 { animation: bounce 2s ease-in-out infinite 0.3s; }
        .bounce3 { animation: bounce 2s ease-in-out infinite 0.6s; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .header h1 { margin: 0; font-size: 28px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; }
        .badge-cv { background: #00b894; }
        .badge-ai { background: #2563eb; }
        .container { position: relative; display: inline-block; }
        video { display: block; border-radius: 8px; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; border-radius: 8px; }
        .controls { margin-top: 16px; display: flex; gap: 12px; align-items: center; }
        button { padding: 10px 24px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; }
        #startBtn { background: #00b894; color: #fff; }
        #stopBtn { background: #d63031; color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        select { padding: 8px 12px; font-size: 14px; border-radius: 6px; border: 1px solid #636e72; background: #2d3436; color: #fff; }
        #status { margin-top: 12px; font-size: 14px; color: #b2bec3; }
        #detections { margin-top: 12px; font-size: 14px; color: #dfe6e9; max-width: 640px; }
        .nav { margin-bottom: 16px; }
        .nav a { color: #74b9ff; text-decoration: none; font-size: 14px; }
        footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.15); font-size: 12px; color: #636e72; text-align: center; width: 100%; max-width: 640px; }
        footer strong { color: #b2bec3; }
    </style>
</head>
<body>
    <div class="logos">
        <img src="https://img.icons8.com/color/48/microsoft.png" alt="Microsoft" class="bounce1" />
        <span class="bounce2">+</span>
        <img src="https://img.icons8.com/fluency/48/azure-1.png" alt="Azure" class="bounce2" />
        <span class="bounce3">+</span>
        <img src="https://img.icons8.com/fluency/48/camera.png" alt="Vision" class="bounce3" />
    </div>
    <div class="nav"><a href="/kiosk">Go to Passenger Kiosk &rarr;</a></div>
    <div class="header">
        <h1>🛡️ Airport Vision</h1>
        <span class="badge badge-cv">Computer Vision</span>
        <span class="badge badge-ai">Azure AI</span>
    </div>
    <div class="container">
        <video id="video" width="640" height="480" autoplay muted></video>
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>
    <div class="controls">
        <select id="modeSelect">
            <option value="/detect">Computer Vision</option>
            <option value="/detect-llm">LLM (GPT-5.4-nano)</option>
        </select>
        <button id="startBtn" onclick="startDetection()">Start Detection</button>
        <button id="stopBtn" onclick="stopDetection()" disabled>Stop</button>
    </div>
    <div id="status">Click "Start Detection" to begin</div>
    <div id="detections"></div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        const statusEl = document.getElementById('status');
        const detectionsEl = document.getElementById('detections');
        let intervalId = null;
        let capturing = false;

        // Start camera
        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, facingMode: 'environment' }
            });
            video.srcObject = stream;
        }

        function captureFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
        }

        async function detectOnce() {
            if (!capturing) return;
            statusEl.textContent = 'Analyzing...';
            try {
                const blob = await captureFrame();
                const form = new FormData();
                form.append('image', blob, 'frame.jpg');

                const detectUrl = document.getElementById('modeSelect').value;
                const resp = await fetch(detectUrl, { method: 'POST', body: form });
                const data = await resp.json();

                drawDetections(data.objects);
                updateDetectionList(data.objects);
                statusEl.textContent = `Detected ${data.objects.length} object(s)`;
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
            }
        }

        function drawDetections(objects) {
            ctx.clearRect(0, 0, overlay.width, overlay.height);

            const scaleX = overlay.width / video.videoWidth;
            const scaleY = overlay.height / video.videoHeight;

            for (const obj of objects) {
                const bb = obj.boundingBox;
                const x = bb.x * scaleX;
                const y = bb.y * scaleY;
                const w = bb.w * scaleX;
                const h = bb.h * scaleY;
                const conf = (obj.confidence * 100).toFixed(0);

                ctx.strokeStyle = '#00b894';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);

                const label = `${obj.label} ${conf}%`;
                ctx.font = '14px Arial';
                const textW = ctx.measureText(label).width;
                ctx.fillStyle = 'rgba(0, 184, 148, 0.8)';
                ctx.fillRect(x, y - 20, textW + 8, 20);
                ctx.fillStyle = '#fff';
                ctx.fillText(label, x + 4, y - 5);
            }
        }

        function updateDetectionList(objects) {
            if (objects.length === 0) {
                detectionsEl.innerHTML = 'No objects detected';
                return;
            }
            const threats = objects.filter(o => o.threat);
            const safe = objects.filter(o => !o.threat);
            let html = '';
            if (threats.length > 0) {
                html += '<span style="color:#d63031;font-weight:bold;">THREAT: ' +
                    threats.map(o => `${o.label} (${(o.confidence * 100).toFixed(0)}%)`).join(', ') +
                    '</span>';
            }
            if (safe.length > 0) {
                if (html) html += ' &nbsp;|&nbsp; ';
                html += safe.map(o => `${o.label} (${(o.confidence * 100).toFixed(0)}%)`).join(', ');
            }
            detectionsEl.innerHTML = html;
        }

        async function startDetection() {
            await initCamera();
            capturing = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            statusEl.textContent = 'Camera started, detecting...';
            // Send a frame every 1.5 seconds
            detectOnce();
            intervalId = setInterval(detectOnce, 1500);
        }

        function stopDetection() {
            capturing = false;
            clearInterval(intervalId);
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            statusEl.textContent = 'Stopped';
            // Stop camera
            const tracks = video.srcObject?.getTracks();
            tracks?.forEach(t => t.stop());
        }
    </script>
    <footer>v1.0 &middot; Built by <strong>Vinex22@gmail.com</strong> &middot; <strong>Vinayjain@microsoft.com</strong></footer>
</body>
</html>
